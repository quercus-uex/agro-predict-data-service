openapi: 3.1.0
info:
  title: Servicio de Datos - OpenAPI 3.1
  description: |-
    Este es un servicio dedicado a aportar datos solicitado por los servicios principales del sistema software a desarrollar.  
    Se encarga de obtener datos de servicios proveedores y los normaliza para aportar un tratado de datos más sencillo.

    Este servicio consulta datos a proveedores, los normaliza y los envía como respuesta, no se encarga de almancenarlos.

    Links sobre los servicios de recogida de datos meteorológicos:
    - [Servicio AEMET](https://github.com/agro-predict-tfg-2026/Aemet.git)
    - [Servicio SiAR](https://github.com/agro-predict-tfg-2026/SiAR.git)
    - [Servicio ITACyL](https://github.com/agro-predict-tfg-2026/ITACyL.git)

  contact:
    email: amendoma@alumnos.unex.es
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
externalDocs:
  description: Conoce en profundidad el objetivo del proyecto
  url: https://github.com/alvaromendoooo/Meteorologic-Predictions

servers:
  - url: http://data:9023/api/v1

tags:
  - name: Históricos
    description: Obtención de datos climáticos históricos sobre una provincia | CCAA | estación meteorológica.
  - name: Actuales
    description: Obtención de datos climáticos actuales sobre una provincia | CCAA | estación meteorológica.
  - name: Pronóstico
    description: Obtención de datos climáticos futuros sobre una provincia | CCAA.
  - name: Calendario
    description: Obtención de datos relacionados con plagas | enfermedades.
  - name: Catálogo
    description: Agrupación diversa de datos con su descripción para consultar

paths:
  /climate/historical/provincias:
    get:
      tags:
        - Históricos
      summary: Obtiene datos climáticos históricos por provincia
      description: Consulta el proveedor externo SiAR para obtener datos climáticos históricos asociados a una provincia en un rango temporal determinado.
      operationId: getHistoricalProvincial
      parameters:
        - name: provinceCode
          in: query
          description: Código de la provincia
          required: true
          schema:
            type: string
            enum: [ CC, BA ]
        - name: type
          in: query
          description: Tipo de registro horario que se quiere consultar
          required: true
          schema:
            type: string
            enum: [HORA, DIA, SEMANA, MES]
        - name: startDate
          in: query
          description: Fecha de inicio del histórico
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Fecha de fin del historico
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Datos históricos provinciales obtenidos correctamente
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/HistoricoHoraResponse'
                  - $ref: '#/components/schemas/HistoricoDiaResponse'
                  - $ref: '#/components/schemas/HistoricoSemanaResponse'
                  - $ref: '#/components/schemas/HistoricoMesResponse'
                discriminator:
                  propertyName: type
        '400':
          description: Parámetros de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParametersError'
        
        '404':
          description: No existen datos históricos para los parámetros indicados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

        '502':
          description: Error al consultar el proveedor externo SiAR
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderError'

  /climate/historical/estacion:
    get:
      tags:
        - Históricos
      summary: Obtiene datos históricos climáticos por estación
      description: Consulta el proveedor externo SiAR para obtener datos climáticos históricos asociados a una estación dada de alta en un rango temporal determinado.
      operationId: getHistoricalEstacion
      parameters:
        - name: estacionCode
          in: query
          description: Código de la estación
          required: true
          schema:
            type: string
            enum: [CC01, ... , CC109]
        - name: type
          in: query
          description: Tipo de registro horario que se quiere consultar
          required: true
          schema:
            type: string
            enum: [HORA, DIA, SEMANA, MES]
        - name: startDate
          in: query
          description: Fecha de inicio del histórico
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Fecha de fin del historico
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Datos históricos por estación obtenidos
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/HistoricoHoraResponse'
                  - $ref: '#/components/schemas/HistoricoDiaResponse'
                  - $ref: '#/components/schemas/HistoricoSemanaResponse'
                  - $ref: '#/components/schemas/HistoricoMesResponse'
                discriminator:
                  propertyName: type
        '400':
          description: Parámetros de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParametersError'
        
        '404':
          description: No existen datos históricos para los parámetros indicados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

        '502':
          description: Error al consultar el proveedor externo SiAR
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderError'
    
  /climate/current/ccaa/{ccaa}:
    get:
      tags:
        - Actuales
      summary: Predicción sobre una comunidad autónoma hoy
      description: | 
        Predicción para la CCAA que se pasa por parámetros con validez para mismo día que la fecha de petición.
      operationId: getCurrentCCAA
      parameters:
        - name: ccaa
          in: path
          required: true
          description: Código de la Comunidad Autónoma
          schema:
            type: string
            enum:
              - "and" # Andalucía  
              - "arn" # Aragón  
              - "ast" # Asturias  
              - "bal" # Islas Baleares  
              - "coo" # Islacas Canarias  
              - "can" # Cantabria  
              - "cle" # Castilla y León  
              - "clm" # Castilla - La Mancha  
              - "cat" # Cataluña  
              - "val" # Comunidad Valenciana  
              - "ext" # Extremadura  
              - "gal" # Galicia  
              - "mad" # Madrid  
              - "mur" # Murcia  
              - "nav" # Navarra  
              - "pva" # País Vasco  
              - "rio" # La Rioja  
            examples: [ext]
      responses:
        '200':
          description: Datos actuales por CCAA obtenidos correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatosClimaticosCcaaActuales'
        '400':
          description: Parámetros de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParametersError'
        
        '404':
          description: No existen datos actuales para la CCAA indicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'

        '502':
          description: Error al consultar el proveedor externo AEMET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderError'

  /climate/current/nacional:
    get:
      tags:
        - Actuales
      summary: Predicción meteorológica nacional hoy
      description: Predicción nacional para el día actual a la fecha de elaboración de la petición.
      operationId: getCurrentNacional
      responses:
        '200':
          description: Datos actuales nacionales obtenidos correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatosClimatiocsActuales'
        '502':
          description: Error al consultar el proveedor externo AEMET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderError'
  
  /climate/current/provincia/{provinciaCode}:
