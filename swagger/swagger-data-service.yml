              - "06"  # Badajoz
              - "08"  # Barcelona
              - "48"  # Bizkaia
              - "09"  # Burgos
              - "10"  # Cáceres
              - "11"  # Cádiz
              - "39"  # Cantabria
              - "12"  # Castellón
              - "51"  # Ceuta
              - "13"  # Ciudad Real
              - "14"  # Córdoba
              - "15"  # A Coruña
              - "16"  # Cuenca
              - "17"  # Girona
              - "18"  # Granada
              - "19"  # Guadalajara
              - "20"  # Gipuzkoa
              - "21"  # Huelva
              - "22"  # Huesca
              - "071" # Menorca
              - "072" # Mallorca
              - "073" # Ibiza y Formentera
              - "351" # Lanzarote
              - "352" # Fuerteventura
              - "353" # Gran Canaria
              - "381" # Tenerife
              - "382" # La Gomera
              - "383" # La Palma
              - "384" # El Hierro
              - "23"  # Jaén
              - "24"  # León
              - "25"  # Lleida
              - "27"  # Lugo
              - "28"  # Madrid
              - "29"  # Málaga
              - "52"  # Melilla
              - "30"  # Murcia
              - "31"  # Navarra
              - "32"  # Ourense
              - "34"  # Palencia
              - "36"  # Pontevedra
              - "26"  # La Rioja
              - "37"  # Salamanca
              - "40"  # Segovia
              - "41"  # Sevilla
              - "42"  # Soria
              - "43"  # Tarragona
              - "44"  # Teruel
              - "45"  # Toledo
              - "46"  # Valencia
              - "47"  # Valladolid
              - "49"  # Zamora
              - "50"  # Zaragoza
