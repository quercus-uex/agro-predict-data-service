
name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libmariadb-dev
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: pytest . || exit 0 # TODO: eliminar || exit 0 cuando haya tests implementados


  docker:

    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{vars.DOCKER_USERNAME}}/agro-predict
          tags: |
            type=sha,prefix=data-service-,format=short,enable=${{github.ref != 'refs/heads/main'}}
            type=raw,value=latest,prefix=data-service-,enable=${{github.ref == 'refs/heads/main'}}

      - name: Login in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{vars.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Set Up Docker Build
        uses: docker/setup-buildx-action@v4


      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{steps.meta.outputs.tags}}
          annotations: ${{steps.meta.outputs.annotations}}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
